<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIR Academy — Teleprompter | Session 1</title>
<style>
  :root{
    --bg:#0A0A0A;
    --gold:#C9A84C;
    --gold-dim:#8f7635;
    --text:#F2EFE7;
    --text-dim:#9c9890;
    --panel:#151412;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--bg);
    font-family:Georgia, 'Times New Roman', serif;
    color:var(--text);
    overflow:hidden;
  }
  #app{
    display:flex;
    flex-direction:column;
    height:100vh;
  }
  #topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 20px;
    background:var(--panel);
    border-bottom:1px solid #262420;
    flex-shrink:0;
    gap:16px;
    flex-wrap:wrap;
  }
  #brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
    letter-spacing:0.08em;
    color:var(--gold);
    text-transform:uppercase;
  }
  #brand .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--gold);
  }
  #videoSelect{
    background:#0A0A0A;
    color:var(--text);
    border:1px solid var(--gold-dim);
    padding:6px 10px;
    border-radius:4px;
    font-family:Georgia, serif;
    font-size:13px;
  }
  .controls{
    display:flex;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
  }
  .ctrl-group{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    color:var(--text-dim);
  }
  input[type=range]{
    accent-color:var(--gold);
    width:100px;
  }
  button{
    background:transparent;
    border:1px solid var(--gold-dim);
    color:var(--gold);
    padding:8px 16px;
    border-radius:4px;
    font-family:Georgia, serif;
    font-size:13px;
    cursor:pointer;
    letter-spacing:0.03em;
    transition:all .15s ease;
  }
  button:hover{
    background:var(--gold);
    color:#0A0A0A;
  }
  button.active{
    background:var(--gold);
    color:#0A0A0A;
  }
  button:disabled{
    opacity:.35;
    cursor:not-allowed;
  }
  #playBtn{
    min-width:90px;
    font-weight:bold;
  }
  #voiceBtn{
    min-width:150px;
    font-weight:bold;
  }
  #voiceBtn.listening{
    background:#7a2e2e;
    border-color:#c14b4b;
    color:#fff;
    animation:pulse 1.4s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(193,75,75,0.5);}
    70%{box-shadow:0 0 0 8px rgba(193,75,75,0);}
    100%{box-shadow:0 0 0 0 rgba(193,75,75,0);}
  }
  #progressBar{
    height:4px;
    background:#1c1a17;
    flex-shrink:0;
    position:relative;
  }
  #progressFill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--gold-dim), var(--gold));
    transition:width .15s linear;
  }
  #statsBar{
    display:flex;
    gap:18px;
    padding:5px 20px;
    background:var(--panel);
    border-bottom:1px solid #262420;
    font-family:Arial, Helvetica, sans-serif;
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:0.04em;
    flex-shrink:0;
    flex-wrap:wrap;
  }
  #statsBar b{
    color:var(--gold);
    font-weight:600;
  }
  #prompterWrap{
    flex:1;
    position:relative;
    overflow:hidden;
  }
  #centerLine{
    position:absolute;
    top:38%;
    left:0;right:0;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    z-index:2;
    pointer-events:none;
  }
  #prompterText{
    position:relative;
    padding:45vh 8vw 60vh 8vw;
    font-size:38px;
    line-height:1.75;
    color:var(--text);
    will-change:transform;
    transition:transform .05s linear;
  }
  #prompterText.mirror{
    transform:scaleX(-1);
  }
  .video-title{
    color:var(--gold);
    font-size:0.55em;
    text-transform:uppercase;
    letter-spacing:0.12em;
    margin:70px 0 30px 0;
    border-bottom:1px solid var(--gold-dim);
    padding-bottom:14px;
  }
  .video-title:first-child{
    margin-top:0;
  }
  .section-label{
    color:var(--gold-dim);
    font-size:0.45em;
    text-transform:uppercase;
    letter-spacing:0.1em;
    margin:36px 0 10px 0;
  }
  p{
    margin:0 0 26px 0;
  }
  .sentence{
    opacity:.5;
    transition:opacity .25s ease, color .25s ease;
  }
  .sentence.active-line{
    opacity:1;
    color:var(--gold);
  }
  .w{
    display:inline;
  }
  #fadeTop, #fadeBottom{
    position:absolute;
    left:0;right:0;
    height:15vh;
    z-index:3;
    pointer-events:none;
  }
  #fadeTop{
    top:0;
    background:linear-gradient(to bottom, var(--bg), transparent);
  }
  #fadeBottom{
    bottom:0;
    background:linear-gradient(to top, var(--bg), transparent);
  }
  #hint{
    position:fixed;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    font-family:Arial, sans-serif;
    font-size:11px;
    color:var(--text-dim);
    z-index:10;
    letter-spacing:0.05em;
    background:rgba(10,10,10,0.85);
    border:1px solid #262420;
    padding:6px 14px;
    border-radius:20px;
    white-space:nowrap;
    transition:opacity .4s ease;
  }
  #hint.faded{
    opacity:0;
    pointer-events:none;
  }
  #micWarning{
    position:fixed;
    top:70px;
    left:50%;
    transform:translateX(-50%);
    background:#3a2323;
    border:1px solid #c14b4b;
    color:#f2d9d9;
    font-family:Arial, sans-serif;
    font-size:12px;
    padding:10px 18px;
    border-radius:6px;
    z-index:20;
    max-width:80vw;
    text-align:center;
    display:none;
  }
  ::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="brand"><span class="dot"></span> NIR Academy · Teleprompter</div>

    <select id="videoSelect">
      <option value="all">All three videos</option>
      <option value="v1">Video 1</option>
      <option value="v2">Video 2</option>
      <option value="v3">Video 3</option>
    </select>

    <div class="controls">
      <button id="voiceBtn">🎙️ Voice Tracking</button>
      <div class="ctrl-group">
        Speed
        <input type="range" id="speedSlider" min="1" max="100" value="15" step="1">
        <span id="speedValue" style="min-width:22px;display:inline-block;">15</span>
      </div>
      <div class="ctrl-group">
        Font size
        <input type="range" id="fontSlider" min="22" max="64" value="38">
      </div>
      <button id="mirrorBtn">Mirror</button>
      <button id="resetBtn">Restart</button>
      <button id="playBtn">▶ Play</button>
    </div>
  </div>

  <div id="progressBar"><div id="progressFill"></div></div>
  <div id="statsBar">
    <span><b id="progressPct">0%</b> complete</span>
    <span>Elapsed <b id="elapsedTime">00:00</b></span>
    <span>Remaining <b id="remainingTime">--:--</b></span>
    <span id="paceInfo"></span>
  </div>

  <div id="prompterWrap">
    <div id="fadeTop"></div>
    <div id="prompterText"></div>
    <div id="centerLine"></div>
    <div id="fadeBottom"></div>
    <div id="hint">Space = play/pause · Up/Down arrows = adjust speed · Mouse scroll also works · Voice Tracking overrides manual scroll</div>
    <div id="micWarning"></div>
  </div>
</div>

const elapsedTimeEl = document.getElementById('elapsedTime');
const remainingTimeEl = document.getElementById('remainingTime');
const paceInfoEl = document.getElementById('paceInfo');
const micWarningEl = document.getElementById('micWarning');

const speedValueEl = document.getElementById('speedValue');
function syncSpeedReadout(){ speedValueEl.textContent = speedSlider.value; }
speedSlider.addEventListener('input', syncSpeedReadout);

setTimeout(()=>{ hintEl.classList.add('faded'); }, 7000);

let playing = false;
let mirrored = false;
let wordEls = [];
let normWords = [];
let wordTops = [];
let sentenceOfWord = [];
let totalWords = 0;
let currentWordIdx = -1;
let activeSentenceEl = null;

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function norm(s){
  return s.toLowerCase().replace(/[^a-z0-9']/g,'');
}

function buildHTML(key){
  const keys = key === "all" ? ["v1","v2","v3"] : [key];
  let html = "";
  keys.forEach(k=>{
    const vid = content[k];
    html += `<div class="video-title">${escapeHtml(vid.title)}</div>`;
    vid.paragraphs.forEach(p=>{
      if(typeof p === "object" && p.type === "section"){
        html += `<div class="section-label">${escapeHtml(p.text)}</div>`;
      } else {
        const sentences = p.match(/[^.!?]+[.!?]*(\s+|$)/g) || [p];
        html += `<p>`;
        sentences.forEach(sent=>{
          const trimmed = sent.trim();
          if(!trimmed) return;
          const words = trimmed.split(/\s+/);
          const wordsHtml = words.map(w=>{
            return `<span class="w">${escapeHtml(w)}</span>`;
          }).join(' ');
          html += `<span class="sentence">${wordsHtml}</span> `;
        });
        html += `</p>`;
      }
    });
  });
  return html;
}

function render(){
  textEl.innerHTML = buildHTML(videoSelect.value);
  wrapEl.scrollTop = 0;
  scrollPos = 0;
  indexWords();
  recalcTops();
  resetProgressState();
}

function indexWords(){
  wordEls = Array.from(textEl.querySelectorAll('.w'));
  sentenceOfWord = wordEls.map(el => el.closest('.sentence'));
  normWords = wordEls.map(el => norm(el.textContent));
  totalWords = wordEls.length;
}

function recalcTops(){
  wordTops = wordEls.map(el => el.offsetTop);
}

function findNearestWordIndex(){
  if(wordTops.length === 0) return -1;
  const centerY = wrapEl.scrollTop + wrapEl.clientHeight * 0.38;
  let lo = 0, hi = wordTops.length - 1, ans = wordTops.length - 1;
  while(lo <= hi){
    const mid = (lo + hi) >> 1;
    if(wordTops[mid] >= centerY){
      ans = mid; hi = mid - 1;
    } else {
      lo = mid + 1;
    }
  }
  return ans;
}

function updateHighlightAndProgress(){
  const idx = findNearestWordIndex();
  if(idx !== currentWordIdx && idx >= 0){
    currentWordIdx = idx;
    const sEl = sentenceOfWord[idx];
    if(sEl !== activeSentenceEl){
      if(activeSentenceEl) activeSentenceEl.classList.remove('active-line');
      if(sEl) sEl.classList.add('active-line');
      activeSentenceEl = sEl;
    }
  }
  updateProgressUI();
}

let sessionStartTime = null;
let startWordIdx = 0;

function resetProgressState(){
  sessionStartTime = null;
  startWordIdx = 0;
  currentWordIdx = -1;
  if(activeSentenceEl){ activeSentenceEl.classList.remove('active-line'); activeSentenceEl = null; }
  updateProgressUI();
}

function fmtTime(sec){
  if(!isFinite(sec) || sec < 0) return "--:--";
  sec = Math.round(sec);
  const m = Math.floor(sec/60);
  const s = sec%60;
  return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

function updateProgressUI(){
  const idx = Math.max(currentWordIdx, 0);
  const pct = totalWords > 0 ? Math.min(100, Math.round((idx/totalWords)*100)) : 0;
  progressFill.style.width = pct + "%";
  progressPct.textContent = pct + "%";

  if(sessionStartTime === null){
    elapsedTimeEl.textContent = "00:00";
    remainingTimeEl.textContent = "--:--";
    paceInfoEl.textContent = "";
    return;
  }

  const elapsedSec = (Date.now() - sessionStartTime) / 1000;
  elapsedTimeEl.textContent = fmtTime(elapsedSec);

  const wordsCovered = idx - startWordIdx;
  const DEFAULT_WPS = 2.3;
  let wps = DEFAULT_WPS;
  if(wordsCovered > 8 && elapsedSec > 3){
    wps = wordsCovered / elapsedSec;
    paceInfoEl.textContent = "Pace ~" + Math.round(wps*60) + " wpm";
  } else {
    paceInfoEl.textContent = "";
  }
  const remainingWords = Math.max(totalWords - idx, 0);
  const remainingSec = remainingWords / wps;
  remainingTimeEl.textContent = fmtTime(remainingSec);
}

let scrollPos = 0;

function tick(){
  if(voiceActive && voiceTargetScroll !== null){
    const diff = voiceTargetScroll - scrollPos;
    if(Math.abs(diff) < 0.5){
      scrollPos = voiceTargetScroll;
    } else {
      scrollPos += diff * 0.15;
    }
    wrapEl.scrollTop = scrollPos;
  } else if(playing){
    const speed = parseFloat(speedSlider.value) / 28;
    scrollPos += speed;
    wrapEl.scrollTop = scrollPos;
    if(wrapEl.scrollTop >= wrapEl.scrollHeight - wrapEl.clientHeight){
      playing = false;
      playBtn.textContent = "▶ Play";
    }
  }
  updateHighlightAndProgress();
  requestAnimationFrame(tick);
}

playBtn.addEventListener('click', ()=>{
  if(voiceActive) return;
  playing = !playing;
  playBtn.textContent = playing ? "⏸ Pause" : "▶ Play";
  hintEl.classList.add('faded');
  if(playing && sessionStartTime === null){
    sessionStartTime = Date.now();
    startWordIdx = Math.max(currentWordIdx, 0);
  }
});

resetBtn.addEventListener('click', ()=>{
  wrapEl.scrollTop = 0;
  scrollPos = 0;
  playing = false;
  playBtn.textContent = "▶ Play";
  resetProgressState();
});

mirrorBtn.addEventListener('click', ()=>{
  mirrored = !mirrored;
  textEl.classList.toggle('mirror', mirrored);
  mirrorBtn.classList.toggle('active', mirrored);
});

fontSlider.addEventListener('input', ()=>{
  textEl.style.fontSize = fontSlider.value + "px";
  requestAnimationFrame(recalcTops);
});

videoSelect.addEventListener('change', ()=>{
  stopVoiceTracking();
  render();
});

document.addEventListener('keydown', (e)=>{
  if(e.code === 'Space'){
    e.preventDefault();
    if(voiceActive) return;
    playing = !playing;
    playBtn.textContent = playing ? "⏸ Pause" : "▶ Play";
    if(playing && sessionStartTime === null){
      sessionStartTime = Date.now();
      startWordIdx = Math.max(currentWordIdx, 0);
    }
  } else if(e.code === 'ArrowUp'){
    speedSlider.value = Math.min(100, parseInt(speedSlider.value)+2);
    syncSpeedReadout();
  } else if(e.code === 'ArrowDown'){
    speedSlider.value = Math.max(1, parseInt(speedSlider.value)-2);
    syncSpeedReadout();
  }
});

wrapEl.addEventListener('wheel', (e)=>{
  if(voiceActive) return;
  wrapEl.scrollTop += e.deltaY;
  scrollPos = wrapEl.scrollTop;
}, {passive:true});

window.addEventListener('resize', ()=>{ requestAnimationFrame(recalcTops); });

/* ===================== VOICE TRACKING ===================== */
let recognition = null;
let voiceActive = false;
const LOOKAHEAD = 40;
const LEAD_WORDS = 5;
const BUFFER_SIZE = 8;
const MIN_BUFFER_FOR_MATCH = 3;
const MATCH_THRESHOLD = 0.6;

function showMicWarning(msg){
  micWarningEl.textContent = msg;
  micWarningEl.style.display = 'block';
  setTimeout(()=>{ micWarningEl.style.display = 'none'; }, 6000);
}

let voiceTargetScroll = null;

function scrollWordToCenter(idx){
  if(idx < 0 || idx >= wordTops.length) return;
  const target = wordTops[idx] - wrapEl.clientHeight * 0.38;
  voiceTargetScroll = Math.max(target, 0);
}

function processSpokenWords(rawWords){
  const words = rawWords.map(norm).filter(Boolean);
  if(words.length === 0) return;
  const buffer = words.slice(-BUFFER_SIZE);
  if(buffer.length < MIN_BUFFER_FOR_MATCH) return;

  const searchStart = Math.max(currentWordIdx, 0);
  const searchEnd = Math.min(searchStart + LOOKAHEAD, normWords.length - buffer.length + 1);
  if(searchEnd <= searchStart) return;

  let bestScore = 0;
  let bestOffset = -1;
  for(let k = searchStart; k < searchEnd; k++){
    let matches = 0;
    for(let i = 0; i < buffer.length; i++){
      if(normWords[k + i] === buffer[i]) matches++;
    }
    const score = matches / buffer.length;
    if(score > bestScore){
      bestScore = score;
      bestOffset = k;
    }
  }

  if(bestOffset < 0 || bestScore < MATCH_THRESHOLD) return;

  const matchedEndIdx = bestOffset + buffer.length - 1;
  if(matchedEndIdx > currentWordIdx){
    currentWordIdx = matchedEndIdx;
    const leadIdx = Math.min(currentWordIdx + LEAD_WORDS, wordTops.length - 1);
    scrollWordToCenter(leadIdx);
    updateHighlightAndProgress();
  }
}

function startVoiceTracking(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    showMicWarning("Voice Tracking needs Chrome or Edge (Web Speech API not available in this browser). Falling back to manual scroll.");
    return;
  }
  playing = false;
  playBtn.textContent = "▶ Play";

  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (event)=>{
    let allWords = [];
    for(let r = 0; r < event.results.length; r++){
      const transcript = event.results[r][0].transcript.trim();
      if(transcript) allWords = allWords.concat(transcript.split(/\s+/).filter(Boolean));
    }
    processSpokenWords(allWords);
  };
  recognition.onerror = (e)=>{
    if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
      showMicWarning("Microphone access was blocked. Allow mic permission and try again.");
      stopVoiceTracking();
    }
  };
  recognition.onend = ()=>{
    if(voiceActive){
      try{ recognition.start(); } catch(e){}
    }
  };

  try{
    recognition.start();
    voiceActive = true;
    voiceTargetScroll = scrollPos;
    voiceBtn.classList.add('listening');
    voiceBtn.textContent = "🎙️ Listening… (click to stop)";
    playBtn.disabled = true;
    if(sessionStartTime === null){
      sessionStartTime = Date.now();
      startWordIdx = Math.max(currentWordIdx, 0);
    }
  } catch(e){
    showMicWarning("Could not start voice tracking: " + e.message);
  }
}

function stopVoiceTracking(){
  voiceActive = false;
  voiceTargetScroll = null;
  voiceBtn.classList.remove('listening');
  voiceBtn.textContent = "🎙️ Voice Tracking";
  playBtn.disabled = false;
  if(recognition){
    try{ recognition.onend = null; recognition.stop(); } catch(e){}
    recognition = null;
  }
}

voiceBtn.addEventListener('click', ()=>{
  if(voiceActive){
    stopVoiceTracking();
  } else {
    hintEl.classList.add('faded');
    startVoiceTracking();
  }
});

/* ===================== INIT ===================== */
render();
requestAnimationFrame(tick);
</script>
</body>
</html>
