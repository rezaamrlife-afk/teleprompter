<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIR Academy — Teleprompter | Session 1</title>
<style>
  :root{
    --bg:#0A0A0A;
    --gold:#C9A84C;
    --gold-dim:#8f7635;
    --text:#F2EFE7;
    --text-dim:#9c9890;
    --panel:#151412;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--bg);
    font-family:Georgia, 'Times New Roman', serif;
    color:var(--text);
    overflow:hidden;
  }
  #app{
    display:flex;
    flex-direction:column;
    height:100vh;
  }

  /* ---- Top bar ---- */
  #topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 20px;
    background:var(--panel);
    border-bottom:1px solid #262420;
    flex-shrink:0;
    gap:16px;
    flex-wrap:wrap;
  }
  #brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
    letter-spacing:0.08em;
    color:var(--gold);
    text-transform:uppercase;
  }
  #brand .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--gold);
  }
  #videoSelect{
    background:#0A0A0A;
    color:var(--text);
    border:1px solid var(--gold-dim);
    padding:6px 10px;
    border-radius:4px;
    font-family:Georgia, serif;
    font-size:13px;
  }
  .controls{
    display:flex;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
  }
  .ctrl-group{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    color:var(--text-dim);
  }
  input[type=range]{
    accent-color:var(--gold);
    width:100px;
  }
  button{
    background:transparent;
    border:1px solid var(--gold-dim);
    color:var(--gold);
    padding:8px 16px;
    border-radius:4px;
    font-family:Georgia, serif;
    font-size:13px;
    cursor:pointer;
    letter-spacing:0.03em;
    transition:all .15s ease;
  }
  button:hover{
    background:var(--gold);
    color:#0A0A0A;
  }
  button.active{
    background:var(--gold);
    color:#0A0A0A;
  }
  #playBtn{
    min-width:90px;
    font-weight:bold;
  }

  /* ---- Prompter area ---- */
  #prompterWrap{
    flex:1;
    position:relative;
    overflow:hidden;
  }
  #centerLine{
    position:absolute;
    top:38%;
    left:0;right:0;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    z-index:2;
    pointer-events:none;
  }
  #prompterText{
    position:relative;
    padding:45vh 8vw 60vh 8vw;
    font-size:38px;
    line-height:1.75;
    color:var(--text);
    will-change:transform;
    transition:transform .05s linear;
  }
  #prompterText.mirror{
    transform:scaleX(-1);
  }
  .video-title{
    color:var(--gold);
    font-size:0.55em;
    text-transform:uppercase;
    letter-spacing:0.12em;
    margin:70px 0 30px 0;
    border-bottom:1px solid var(--gold-dim);
    padding-bottom:14px;
  }
  .video-title:first-child{
    margin-top:0;
  }
  .section-label{
    color:var(--gold-dim);
    font-size:0.45em;
    text-transform:uppercase;
    letter-spacing:0.1em;
    margin:36px 0 10px 0;
  }
  p{
    margin:0 0 26px 0;
  }
  #prompterText .fade-edge-top,
  #prompterText .fade-edge-bottom{
    display:none;
  }
  #fadeTop, #fadeBottom{
    position:absolute;
    left:0;right:0;
    height:15vh;
    z-index:3;
    pointer-events:none;
  }
  #fadeTop{
    top:0;
    background:linear-gradient(to bottom, var(--bg), transparent);
  }
  #fadeBottom{
    bottom:0;
    background:linear-gradient(to top, var(--bg), transparent);
  }

  #hint{
    position:fixed;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    font-family:Arial, sans-serif;
    font-size:11px;
    color:var(--text-dim);
    z-index:10;
    letter-spacing:0.05em;
    background:rgba(10,10,10,0.85);
    border:1px solid #262420;
    padding:6px 14px;
    border-radius:20px;
    white-space:nowrap;
    transition:opacity .4s ease;
  }
  #hint.faded{
    opacity:0;
    pointer-events:none;
  }

  ::-webkit-scrollbar{display:none;}

  /* ---- Progress bar ---- */
  #progressBar{
    height:3px;
    background:var(--gold);
    width:0%;
    transition:width .2s linear;
    flex-shrink:0;
  }

  /* ---- Stats bar ---- */
  #statsBar{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:28px;
    padding:5px 20px;
    background:var(--panel);
    border-bottom:1px solid #1a1816;
    font-family:Arial, sans-serif;
    font-size:12px;
    color:var(--text-dim);
    flex-shrink:0;
    letter-spacing:0.05em;
  }
  #statsBar span b{
    color:var(--gold);
    font-weight:normal;
  }

  /* ---- Current line highlight ---- */
  .line-active{
    color:var(--gold) !important;
    text-shadow:0 0 18px rgba(201,168,76,0.35);
    transition:color .1s;
  }
  p, .section-label, .video-title{
    transition:color .1s, opacity .1s;
  }
  #prompterText.highlight-on p,
  #prompterText.highlight-on .section-label{
    color:var(--text-dim);
    opacity:0.45;
  }
  #prompterText.highlight-on .line-active{
    color:var(--gold) !important;
    opacity:1 !important;
    text-shadow:0 0 18px rgba(201,168,76,0.35);
  }

  /* ---- Voice status badge ---- */
  #voiceBadge{
    font-family:Arial,sans-serif;
    font-size:11px;
    padding:3px 10px;
    border-radius:12px;
    border:1px solid var(--gold-dim);
    color:var(--text-dim);
    background:transparent;
    transition:all .2s;
    white-space:nowrap;
  }
  #voiceBadge.listening{
    border-color:var(--gold);
    color:var(--gold);
    background:rgba(201,168,76,0.08);
  }
  #voiceBadge.active{
    border-color:#4caf7d;
    color:#4caf7d;
    background:rgba(76,175,125,0.08);
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="brand"><span class="dot"></span> NIR Academy · Teleprompter · Session 1</div>

    <select id="videoSelect">
      <option value="all">All three videos</option>
      <option value="v1">Video 1 — Language User vs Language Teacher</option>
      <option value="v2">Video 2 — The Five Teacher Roles</option>
      <option value="v3">Video 3 — Myths, Identity & Reflection</option>
    </select>

    <div class="controls">
      <div class="ctrl-group">
        Speed
        <input type="range" id="speedSlider" min="10" max="120" value="40">
      </div>
      <div class="ctrl-group">
        Font size
        <input type="range" id="fontSlider" min="22" max="64" value="38">
      </div>
      <button id="mirrorBtn">Mirror</button>
      <button id="highlightBtn">Highlight</button>
      <button id="voiceBtn">🎤 Voice</button>
      <button id="resetBtn">Restart</button>
      <button id="playBtn">▶ Play</button>
    </div>
  </div>
  <div id="progressBar"></div>
  <div id="statsBar">
    <span>Progress: <b id="statPct">0%</b></span>
    <span>Elapsed: <b id="statElapsed">0:00</b></span>
    <span>Remaining: <b id="statRemain">—</b></span>
    <span id="voiceBadge">🎤 Voice off</span>
  </div>

  <div id="prompterWrap">
    <div id="fadeTop"></div>
    <div id="prompterText"></div>
    <div id="centerLine"></div>
    <div id="fadeBottom"></div>
    <div id="hint">Space = play/pause · Up/Down arrows = adjust speed · Mouse scroll also works</div>
  </div>
</div>

function buildHTML(key){
  const keys = key === "all" ? ["v1","v2","v3"] : [key];
  let html = "";
  keys.forEach(k=>{
    const vid = content[k];
    html += `<div class="video-title">${vid.title}</div>`;
    vid.paragraphs.forEach(p=>{
      if(typeof p === "object" && p.type === "section"){
        html += `<div class="section-label">${p.text}</div>`;
      } else {
        html += `<p>${p}</p>`;
      }
    });
  });
  return html;
}

const textEl = document.getElementById('prompterText');
const wrapEl = document.getElementById('prompterWrap');
const videoSelect = document.getElementById('videoSelect');
const speedSlider = document.getElementById('speedSlider');
const fontSlider = document.getElementById('fontSlider');
const playBtn = document.getElementById('playBtn');
const mirrorBtn = document.getElementById('mirrorBtn');
const highlightBtn = document.getElementById('highlightBtn');
const voiceBtn = document.getElementById('voiceBtn');
const resetBtn = document.getElementById('resetBtn');
const hintEl = document.getElementById('hint');
const progressBarEl = document.getElementById('progressBar');
const statPct = document.getElementById('statPct');
const statElapsed = document.getElementById('statElapsed');
const statRemain = document.getElementById('statRemain');
const voiceBadge = document.getElementById('voiceBadge');

setTimeout(()=>{ hintEl.classList.add('faded'); }, 6000);

let playing = false;
let highlightOn = false;
let startTime = null;
let elapsedAtPause = 0;

// ── Highlight current line ──────────────────────────────────────────
function updateHighlight(){
  if(!highlightOn) return;
  const centerY = wrapEl.getBoundingClientRect().top + wrapEl.clientHeight * 0.38;
  let closest = null, closestDist = Infinity;
  textEl.querySelectorAll('p, .section-label').forEach(el=>{
    el.classList.remove('line-active');
    const r = el.getBoundingClientRect();
    const mid = r.top + r.height / 2;
    const dist = Math.abs(mid - centerY);
    if(dist < closestDist){ closestDist = dist; closest = el; }
  });
  if(closest) closest.classList.add('line-active');
}

// ── Progress + time ─────────────────────────────────────────────────
function fmt(sec){
  const m = Math.floor(sec/60), s = Math.floor(sec%60);
  return m+':'+(s<10?'0':'')+s;
}
function updateProgress(){
  const max = wrapEl.scrollHeight - wrapEl.clientHeight;
  const pct = max > 0 ? wrapEl.scrollTop / max : 0;
  progressBarEl.style.width = (pct*100).toFixed(1)+'%';
  statPct.textContent = Math.round(pct*100)+'%';
  const now = Date.now();
  const elapsed = playing && startTime ? elapsedAtPause + (now - startTime)/1000 : elapsedAtPause;
  statElapsed.textContent = fmt(elapsed);
  if(pct > 0.001){
    const total = elapsed / pct;
    const remain = Math.max(0, total - elapsed);
    statRemain.textContent = fmt(remain);
  } else {
    statRemain.textContent = '—';
  }
}

// ── Voice tracking — transcript alignment ──────────────────────────
let recognition = null;
let voiceActive = false;

// Flat word list extracted from prompter content
let scriptWords = [];   // [{word, paraIdx, wordIdx}]
let alignCursor = 0;    // index into scriptWords of next expected word
let voiceScrollTarget = null; // null = no override; number = target scrollTop
let voiceSpeaking = false;

function normalizeWord(w){
  return w.toLowerCase().replace(/[^a-z0-9']/g, '');
}

function buildScriptWords(){
  scriptWords = [];
  textEl.querySelectorAll('p').forEach((el, pi)=>{
    const words = el.textContent.trim().split(/\s+/);
    words.forEach((w, wi)=>{
      const n = normalizeWord(w);
      if(n) scriptWords.push({norm:n, el, pi, wi});
    });
  });
  alignCursor = 0;
  voiceScrollTarget = null;
}

// Try to match a transcript string against scriptWords starting near alignCursor.
// Returns the index of the last matched word, or -1 if no match.
function matchTranscript(transcript){
  const spoken = transcript.trim().split(/\s+/).map(normalizeWord).filter(Boolean);
  if(!spoken.length) return -1;

  // Search window: look ahead up to 80 words from cursor (handles skips/restarts)
  const searchStart = Math.max(0, alignCursor - 5);
  const searchEnd   = Math.min(scriptWords.length - spoken.length, alignCursor + 80);

  let bestIdx = -1, bestScore = 0;

  for(let i = searchStart; i <= searchEnd; i++){
    let matches = 0;
    for(let j = 0; j < spoken.length && i+j < scriptWords.length; j++){
      if(scriptWords[i+j].norm === spoken[j]) matches++;
    }
    const score = matches / spoken.length;
    if(score > bestScore && score >= 0.5){
      bestScore = score;
      bestIdx = i + spoken.length - 1; // last matched word position
    }
  }
  return bestIdx;
}

function scrollToWord(wordIdx){
  const entry = scriptWords[wordIdx];
  if(!entry) return;
  const elRect = entry.el.getBoundingClientRect();
  const wrapRect = wrapEl.getBoundingClientRect();
  // Target: matched paragraph sits at 38% from top (center line)
  const target = wrapEl.scrollTop + (elRect.top - wrapRect.top) - wrapEl.clientHeight * 0.38;
  voiceScrollTarget = Math.max(0, target);
}

// ── UI state helpers ────────────────────────────────────────────────
function setManualMode(){
  // Voice off → enable Play + Speed
  playBtn.disabled = false;
  playBtn.style.opacity = '';
  speedSlider.disabled = false;
  speedSlider.style.opacity = '';
}

function setVoiceMode(){
  // Voice on → disable Play + Speed, stop any manual playback
  if(playing){
    elapsedAtPause += (Date.now() - startTime) / 1000;
    startTime = null;
    playing = false;
  }
  playBtn.textContent = "▶ Play";
  playBtn.disabled = true;
  playBtn.style.opacity = '0.35';
  speedSlider.disabled = true;
  speedSlider.style.opacity = '0.35';
}

// ── Voice mode ──────────────────────────────────────────────────────
const SILENCE_STOP_MS = 7000; // 7 s silence → stop scroll
let _silenceTimer = null;

function onSpeechDetected(transcript){
  voiceSpeaking = true;
  clearTimeout(_silenceTimer);
  _silenceTimer = setTimeout(()=>{
    voiceSpeaking = false;
    voiceScrollTarget = null;
    voiceBadge.textContent = '🎤 Listening…';
    voiceBadge.className = 'listening';
  }, SILENCE_STOP_MS);

  const matchedIdx = matchTranscript(transcript);
  if(matchedIdx !== -1 && matchedIdx >= alignCursor){
    alignCursor = matchedIdx + 1;
    scrollToWord(matchedIdx);
    voiceBadge.textContent = '🗣 Speaking';
    voiceBadge.className = 'active';
  } else {
    voiceScrollTarget = null; // no jump — let baseline speed carry
    voiceBadge.textContent = '🗣 Speaking';
    voiceBadge.className = 'active';
  }
}

function startVoice(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    alert('متأسفانه مرورگر شما Web Speech API را پشتیبانی نمی‌کند.\nلطفاً از Chrome استفاده کنید.');
    return;
  }
  buildScriptWords();
  setVoiceMode();

  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onstart = ()=>{
    voiceActive = true;
    voiceSpeaking = false;
    voiceBadge.textContent = '🎤 Listening…';
    voiceBadge.className = 'listening';
    voiceBtn.classList.add('active');
    voiceBtn.textContent = '🎤 Voice ON';
  };

  recognition.onresult = (e)=>{
    let interim = '', final = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal) final += t + ' ';
      else interim += t;
    }
    const transcript = (final || interim).trim();
    if(transcript) onSpeechDetected(transcript);
  };

  recognition.onerror = (e)=>{
    if(e.error === 'not-allowed'){
      alert('میکروفون دسترسی ندارد. لطفاً مجوز میکروفون را در مرورگر فعال کنید.');
      stopVoice();
    }
    // other errors (network, aborted): onend will auto-restart
  };

  recognition.onend = ()=>{
    // Auto-reconnect as long as voice mode is active
    if(voiceActive){
      try { recognition.start(); } catch(_){}
    }
  };

  recognition.start();
}

function stopVoice(){
  voiceActive = false;
  voiceSpeaking = false;
  voiceScrollTarget = null;
  clearTimeout(_silenceTimer);
  if(recognition){ try{ recognition.stop(); }catch(_){} }
  voiceBadge.textContent = '🎤 Voice off';
  voiceBadge.className = '';
  voiceBtn.classList.remove('active');
  voiceBtn.textContent = '🎤 Voice';
  setManualMode();
}

// ── Main loop ───────────────────────────────────────────────────────
// Baseline scroll speed in voice mode (matches Speed slider midpoint feel)
const VOICE_BASE_SPEED = 40;

function tick(){
  if(voiceActive){
    // Voice mode — fully independent of `playing`
    if(voiceSpeaking && voiceScrollTarget !== null){
      const diff = voiceScrollTarget - wrapEl.scrollTop;
      if(Math.abs(diff) > 1){
        wrapEl.scrollTop += diff * 0.07;
      } else {
        voiceScrollTarget = null;
      }
    }
    // No target or silent → do not scroll
  } else if(playing){
    // Manual mode
    wrapEl.scrollTop += parseFloat(speedSlider.value) / 12;
    if(wrapEl.scrollTop >= wrapEl.scrollHeight - wrapEl.clientHeight){
      playing = false;
      elapsedAtPause += (Date.now() - startTime) / 1000;
      startTime = null;
      playBtn.textContent = "▶ Play";
    }
  }
  updateHighlight();
  updateProgress();
  requestAnimationFrame(tick);
}

// ── Controls ────────────────────────────────────────────────────────
function render(){
  textEl.innerHTML = buildHTML(videoSelect.value);
  wrapEl.scrollTop = 0;
  elapsedAtPause = 0;
  startTime = null;
  playing = false;
  playBtn.textContent = "▶ Play";
  voiceScrollTarget = null;
  alignCursor = 0;
  voiceSpeaking = false;
  clearTimeout(_silenceTimer);
  if(voiceActive) buildScriptWords();
}

playBtn.addEventListener('click', ()=>{
  if(voiceActive) return; // disabled in voice mode
  playing = !playing;
  if(playing){
    startTime = Date.now();
    playBtn.textContent = "⏸ Pause";
  } else {
    elapsedAtPause += (Date.now() - startTime) / 1000;
    startTime = null;
    playBtn.textContent = "▶ Play";
  }
  hintEl.classList.add('faded');
});

resetBtn.addEventListener('click', ()=>{
  wrapEl.scrollTop = 0;
  playing = false;
  elapsedAtPause = 0;
  startTime = null;
  playBtn.textContent = "▶ Play";
  voiceSpeaking = false;
  voiceScrollTarget = null;
  alignCursor = 0;
  clearTimeout(_silenceTimer);
  if(voiceActive){
    voiceBadge.textContent = '🎤 Listening…';
    voiceBadge.className = 'listening';
  }
});

mirrorBtn.addEventListener('click', ()=>{
  textEl.classList.toggle('mirror');
  mirrorBtn.classList.toggle('active');
});

highlightBtn.addEventListener('click', ()=>{
  highlightOn = !highlightOn;
  textEl.classList.toggle('highlight-on', highlightOn);
  highlightBtn.classList.toggle('active', highlightOn);
  if(!highlightOn){
    textEl.querySelectorAll('.line-active').forEach(el=>el.classList.remove('line-active'));
  }
});

voiceBtn.addEventListener('click', ()=>{
  voiceActive ? stopVoice() : startVoice();
});

fontSlider.addEventListener('input', ()=>{
  textEl.style.fontSize = fontSlider.value + "px";
});

videoSelect.addEventListener('change', render);

document.addEventListener('keydown', (e)=>{
  if(e.code === 'Space' && !voiceActive){
    e.preventDefault();
    playBtn.click();
  } else if(e.code === 'ArrowUp' && !voiceActive){
    speedSlider.value = Math.min(120, parseInt(speedSlider.value) + 5);
  } else if(e.code === 'ArrowDown' && !voiceActive){
    speedSlider.value = Math.max(10, parseInt(speedSlider.value) - 5);
  }
});

wrapEl.addEventListener('wheel', (e)=>{
  wrapEl.scrollTop += e.deltaY;
}, {passive:true});

render();
tick();
</script>
</body>
</html>
